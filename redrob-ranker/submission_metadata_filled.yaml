  has_network_during_ranking: false
  pre_computation_required: false
  pre_computation_time_minutes: 0

ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Gemini as an agentic pair-programming assistant to build, optimize, and validate the candidate discovery and ranking pipeline.

methodology_summary: |
  OmniRank-X is a deterministic, high-throughput candidate ranking pipeline consisting of a Polars stream loader, a multi-stage pruner (honeypot detection + hard disqualifiers), a semantic discovery model (ONNX INT8 BGE-small embeddings + BM25 + Reciprocal Rank Fusion), trajectory career-progression scoring, and a behavioral composite scoring engine. Computes candidate discovering, ranking, and decision-tree reasoning over 100,000 profiles on CPU in under 21 seconds.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
